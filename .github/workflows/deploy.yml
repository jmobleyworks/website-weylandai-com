name: Deploy weylandai-com to Cloudflare Pages

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to Cloudflare Pages
        run: |
          cd src
          tar -czf ../deployment.tar.gz .
          cd ..

          curl -X POST \
            "https://api.cloudflare.com/client/v4/accounts/$CLOUDFLARE_ACCOUNT_ID/pages/projects/weylandai-com/deployments" \
            -H "X-Auth-Email: johnmobley99@gmail.com" \
            -H "X-Auth-Key: $CLOUDFLARE_API_KEY" \
            -F "manifest=@deployment.tar.gz" \
            -F "branch=main"
        env:
          CLOUDFLARE_API_KEY: ${{ secrets.CLOUDFLARE_API_KEY }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
